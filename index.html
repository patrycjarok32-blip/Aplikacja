<link rel="manifest" href="manifest.webmanifest">
<style>
:root{--orange:#ff7a00;--orange2:#ff9d00;--green:#28a745;--blue:#1684f2;--purple:#7c3aed;--red:#ef4444;--bg:#fffaf4;--card:#fff;--text:#111827;--muted:#6b7280;--line:#eee5dc;--shadow:0 10px 30px rgba(48,31,10,.08)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#fff7ed,#fff);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text)}button,input,select{font:inherit}.app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:76px}.top{position:sticky;top:0;background:rgba(255,250,244,.94);backdrop-filter:blur(18px);z-index:10;border-bottom:1px solid #f3e7da;padding:12px 16px}.status{display:flex;align-items:center;justify-content:space-between}.iconbtn{border:0;background:transparent;font-size:24px;padding:8px;border-radius:12px}.title{text-align:center;font-weight:850}.sub{font-size:12px;color:var(--muted)}.dateRow{display:flex;gap:9px;overflow:auto;padding:12px 2px 2px;scrollbar-width:none}.date{min-width:52px;border:1px solid var(--line);background:white;border-radius:22px;padding:9px;text-align:center;font-weight:700}.date.active{background:linear-gradient(135deg,var(--orange),var(--orange2));color:white;border-color:transparent}.date small{display:block;font-weight:500}.screen{display:none;padding:14px 16px}.screen.active{display:block}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.metric{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:13px;box-shadow:var(--shadow)}.metric .label{font-size:12px;font-weight:800}.metric strong{display:block;font-size:25px;line-height:1.15;margin:4px 0}.metric.green .label,.metric.green strong{color:var(--green)}.metric.orange .label,.metric.orange strong{color:var(--orange)}.metric.blue .label,.metric.blue strong{color:var(--blue)}.bar{height:8px;background:#ece7e2;border-radius:99px;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;border-radius:99px;background:currentColor}.cta{display:flex;align-items:center;gap:12px;border:0;width:100%;background:linear-gradient(135deg,#20a64a,#2f8d3d);color:white;border-radius:20px;padding:14px;margin:14px 0;font-weight:850;text-align:left;box-shadow:var(--shadow)}.cta .plus{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:white;color:#20a64a;font-size:30px}.quick{display:grid;grid-template-columns:1fr 1fr;gap:10px}.quick button{border:1px solid var(--line);background:white;border-radius:16px;padding:12px;text-align:left;box-shadow:var(--shadow)}.quick b{display:block}.hrow{display:flex;justify-content:space-between;align-items:center;margin:16px 0 8px}h2{margin:0;font-size:21px}.link{border:0;background:transparent;color:var(--text);font-weight:700}.meal{display:grid;grid-template-columns:108px 1fr auto;gap:10px;background:white;border:1px solid var(--line);border-radius:18px;margin:9px 0;overflow:hidden;box-shadow:var(--shadow)}.mealImg{height:96px;background-size:cover;background-position:center;position:relative;display:grid;place-items:center;font-size:38px}.mealImg:after{content:'';position:absolute;inset:0;background:linear-gradient(120deg,rgba(255,255,255,.15),rgba(0,0,0,.08))}.mealBody{padding:10px 0}.mealType{color:var(--green);font-size:12px;font-weight:850}.mealName{font-weight:850;font-size:14px;margin:3px 0}.macro{font-size:12px;color:var(--muted);line-height:1.5}.flame{color:var(--orange);font-weight:850}.check{display:grid;place-items:center;padding-right:10px}.check button{border:0;border-radius:50%;width:30px;height:30px;background:#eef2f1;color:#999;font-weight:900}.check button.done{background:#23a83c;color:white}.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:0;z-index:20;width:100%;max-width:520px;background:rgba(255,255,255,.94);backdrop-filter:blur(18px);border-top:1px solid #eee;display:grid;grid-template-columns:repeat(5,1fr);padding:5px 4px calc(5px + env(safe-area-inset-bottom))}.bottom button{border:0;background:transparent;border-radius:14px;padding:6px 2px;color:#555;font-size:10px;font-weight:700}.bottom i{display:block;font-size:19px;font-style:normal}.bottom button.active{color:var(--orange)}.card{background:white;border:1px solid var(--line);border-radius:20px;padding:14px;margin:10px 0;box-shadow:var(--shadow)}.tabs{display:flex;border-bottom:1px solid var(--line);gap:18px}.tabs button{border:0;background:transparent;padding:12px 0;font-weight:800;color:#555}.tabs button.active{color:var(--orange);border-bottom:2px solid var(--orange)}.plan{display:grid;grid-template-columns:58px 1fr auto;gap:12px;align-items:center}.thumb{width:58px;height:58px;border-radius:14px;background-size:cover;background-position:center;display:grid;place-items:center;font-size:26px}.badge{font-size:10px;color:var(--green);font-weight:900}.outline{border:1px solid var(--orange);background:white;color:var(--orange);border-radius:14px;padding:10px 14px;font-weight:850}.primary{border:0;background:linear-gradient(135deg,var(--orange),var(--orange2));color:white;border-radius:15px;padding:12px 16px;font-weight:850}.danger{color:#dc2626!important}.purple{color:var(--purple)!important}.drop{border:1px dashed #bbb;background:#fff;border-radius:20px;padding:26px;text-align:center;margin:12px 0}.drop .cloud{font-size:54px}.shopGroup{background:white;border:1px solid var(--line);border-radius:18px;margin:10px 0;overflow:hidden}.shopHead{display:flex;justify-content:space-between;padding:13px;font-weight:850;background:#fffaf4}.shopItem{display:grid;grid-template-columns:28px 42px 1fr auto;gap:10px;align-items:center;padding:10px 13px;border-top:1px solid var(--line)}.shopItem img,.prodImg{width:42px;height:42px;object-fit:cover;border-radius:10px;background:#fafafa}.shopItem input{width:20px;height:20px}.storeFilters{display:flex;gap:7px;overflow:auto;padding:8px 0}.chip{border:1px solid var(--line);background:white;border-radius:99px;padding:8px 11px;font-weight:750;font-size:12px}.chip.active{border-color:var(--orange);color:var(--orange)}.scanBox{background:white;border:1px solid var(--line);border-radius:20px;padding:14px;box-shadow:var(--shadow)}video{width:100%;max-height:320px;border-radius:18px;background:#111}.input{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:white;margin:6px 0}.activityRow{display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:center;padding:12px;border-bottom:1px solid var(--line)}.circle{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:#e9f8ec}.waterBox{text-align:center}.waterDrop{font-size:72px}.waterBtns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:30;display:none;align-items:flex-end}.modal.show{display:flex}.sheet{background:#fff;border-radius:24px 24px 0 0;max-width:520px;width:100%;margin:0 auto;max-height:88vh;overflow:auto;padding:18px}.x{float:left;border:0;background:transparent;font-size:24px}.formgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.formgrid label{font-size:11px;color:var(--muted)}.formgrid input{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px}.recipeImg{width:100%;height:190px;border-radius:20px;background-size:cover;background-position:center}.empty{text-align:center;color:var(--muted);padding:28px 8px}.note{background:#f7f0ff;border:1px solid #eadcff;color:#5b21b6;border-radius:16px;padding:12px;font-size:13px}.small{font-size:12px;color:var(--muted)}@media(max-width:380px){.grid3{grid-template-columns:1fr}.meal{grid-template-columns:90px 1fr auto}.mealImg{height:90px}.metric strong{font-size:22px}}
</style>
</head><body><div id="app"></div><div id="modal" class="modal"></div>
<script>
const img={breakfast:'https://images.unsplash.com/photo-1511690743698-d9d85f2fbf38?auto=format&fit=crop&w=500&q=70',chicken:'https://images.unsplash.com/photo-1532550907401-a500c9a57435?auto=format&fit=crop&w=500&q=70',pasta:'https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?auto=format&fit=crop&w=500&q=70',yogurt:'https://images.unsplash.com/photo-1488477181946-6428a0291777?auto=format&fit=crop&w=500&q=70',salad:'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=500&q=70',pdf:'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23fff1f1%22/%3E%3Ctext x=%2250%22 y=%2258%22 text-anchor=%22middle%22 font-size=%2223%22 fill=%22%23ef4444%22 font-family=%22Arial%22%3EPDF%3C/text%3E%3C/svg%3E'};
const sampleMeals=[{type:'Śniadanie',time:'07:30',name:'Fit tosty z serem i mini sałatką',kcal:504,b:21,t:26,w:55,img:'breakfast',ingredients:[['Chleb pełnoziarnisty',70,'g'],['Ser cheddar light',30,'g'],['Pomidor',100,'g']]},{type:'Obiad',time:'13:00',name:'Kurczak z ryżem jaśminowym i warzywami',kcal:620,b:42,t:16,w:71,img:'chicken',ingredients:[['Pierś z kurczaka',150,'g'],['Ryż jaśminowy',80,'g'],['Brokuł',150,'g']]},{type:'Przekąska',time:'16:30',name:'Jogurt grecki z miodem i owocami',kcal:210,b:16,t:6,w:20,img:'yogurt',ingredients:[['Jogurt grecki',150,'g'],['Miód',10,'g'],['Borówki',80,'g']]},{type:'Kolacja',time:'19:00',name:'Makaron pełnoziarnisty z sosem pomidorowym',kcal:420,b:20,t:12,w:58,img:'pasta',ingredients:[['Makaron pełnoziarnisty',70,'g'],['Passata',150,'g'],['Mozzarella light',50,'g']]}];
const ukProducts=[{name:'Tesco British Chicken Breast Fillets',store:'Tesco',cat:'Produkty białkowe',img:'https://images.unsplash.com/photo-1604503468506-a8da13d82791?auto=format&fit=crop&w=100&q=60',kcal:143},{name:'ASDA Chicken Breast Fillets',store:'ASDA',cat:'Produkty białkowe',img:'https://images.unsplash.com/photo-1604503468506-a8da13d82791?auto=format&fit=crop&w=100&q=60',kcal:145},{name:'Sainsbury’s Greek Yogurt',store:'Sainsbury’s',cat:'Nabiał',img:'https://images.unsplash.com/photo-1488477181946-6428a0291777?auto=format&fit=crop&w=100&q=60',kcal:71},{name:'Aldi Long Grain Rice',store:'Aldi',cat:'Produkty suche',img:'https://images.unsplash.com/photo-1512058564366-18510be2db19?auto=format&fit=crop&w=100&q=60',kcal:350},{name:'Lidl Wholewheat Pasta',store:'Lidl',cat:'Produkty suche',img:'https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?auto=format&fit=crop&w=100&q=60',kcal:340},{name:'Tesco Broccoli',store:'Tesco',cat:'Warzywa i owoce',img:'https://images.unsplash.com/photo-1459411621453-7b03977f4bfc?auto=format&fit=crop&w=100&q=60',kcal:34}];
const defaultPlans=[{id:'p1',name:'Biedronkowy 2000 kcal',kcal:2000,days:7,meals:sampleMeals,img:'chicken',active:true,archived:false,added:'20.05.2025'},{id:'p2',name:'Biedronkowy 2500 kcal',kcal:2500,days:7,meals:sampleMeals.map(m=>({...m,kcal:Math.round(m.kcal*1.2)})),img:'pasta',active:false,archived:false,added:'18.05.2025'},{id:'p3',name:'Redukcja 1800 kcal',kcal:1800,days:7,meals:sampleMeals.map(m=>({...m,kcal:Math.round(m.kcal*.9)})),img:'salad',active:false,archived:false,added:'15.05.2025'}];
let state=JSON.parse(localStorage.getItem('pwaFullState')||'null')||{tab:'diary',dateOffset:0,plans:defaultPlans,eaten:{},water:{},activities:{},bought:{},customMeals:{},store:'Wszystkie'};
const save=()=>localStorage.setItem('pwaFullState',JSON.stringify(state));const $=s=>document.querySelector(s);const app=$('#app');
function activePlan(){return state.plans.find(p=>p.active&&!p.archived)||state.plans[0]}function dayKey(){let p=activePlan();return p.id+'_d'+state.dateOffset}function imgUrl(k){return img[k]||img.chicken}function totalEaten(){let p=activePlan(),k=dayKey();let eaten=p.meals.filter((_,i)=>state.eaten[k+'_'+i]).reduce((s,m)=>s+m.kcal,0);let custom=(state.customMeals[k]||[]).reduce((s,m)=>s+(+m.kcal||0),0);return eaten+custom}function burned(){return (state.activities[dayKey()]||[]).reduce((s,a)=>s+(+a.kcal||0),0)}function water(){return +(state.water[dayKey()]||0)}
function dates(){let now=new Date();return Array.from({length:7},(_,i)=>{let d=new Date(now);d.setDate(now.getDate()+i-3);return d})}function dow(d){return ['Niedz','Pon','Wt','Śr','Czw','Pt','Sob'][d.getDay()]}
function shell(content){app.innerHTML=`<div class="app"><div class="top"><div class="status"><button class="iconbtn" onclick="go('plans')">☰</button><div class="title">${state.tab==='plans'?'Moje jadłospisy':state.tab==='import'?'Importuj jadłospis':state.tab==='shopping'?'Lista zakupów':state.tab==='scanner'?'Skaner':'Dzisiaj'}⌄</div><button class="iconbtn" onclick="go('import')">＋</button></div>${dateBar()}</div>${content}${nav()}</div>`}
function dateBar(){if(['plans','import'].includes(state.tab))return'';return `<div class="dateRow">${dates().map((d,i)=>`<button class="date ${i-3===state.dateOffset?'active':''}" onclick="state.dateOffset=${i-3};save();render()"><small>${dow(d)}</small>${d.getDate()}</button>`).join('')}</div>`}
function nav(){return `<div class="bottom">${[['diary','🍴','Dziennik'],['water','💧','Woda'],['shopping','☑','Zakupy'],['activity','🔥','Aktywność'],['scanner','▣','Skaner']].map(t=>`<button class="${state.tab===t[0]?'active':''}" onclick="go('${t[0]}')"><i>${t[1]}</i>${t[2]}</button>`).join('')}</div>`}function go(t){state.tab=t;save();render()}
function render(){if(state.tab==='plans')return plans();if(state.tab==='import')return importPlan();if(state.tab==='shopping')return shopping();if(state.tab==='water')return waterScreen();if(state.tab==='activity')return activity();if(state.tab==='scanner')return scanner();diary()}
function diary(){let p=activePlan();shell(`<div class="screen active"><div class="grid3"><div class="metric green"><div class="label">Spożyte kcal</div><strong>${totalEaten()}</strong><span>/ ${p.kcal} kcal</span><div class="bar"><i style="width:${Math.min(100,totalEaten()/p.kcal*100)}%"></i></div></div><div class="metric orange"><div class="label">Spalone kcal</div><strong>${burned()}</strong><span>/ 800 kcal</span><div class="bar"><i style="width:${Math.min(100,burned()/800*100)}%"></i></div></div><div class="metric blue"><div class="label">Woda</div><strong>${water()} ml</strong><span>/ 2000 ml</span><div class="bar"><i style="width:${Math.min(100,water()/2000*100)}%"></i></div></div></div><button class="cta" onclick="customMeal()"><span class="plus">+</span><span>Dodaj posiłek spoza planu<br><small>Dodaj produkt lub gotowy posiłek</small></span></button><div class="quick"><button onclick="go('scanner')"><b>▣ Skaner produktów</b><span class="sub">Skanuj kod kreskowy</span></button><button onclick="go('activity')"><b>🏃 Aktywności Amazfit</b><span class="sub">Dodaj trening</span></button><button onclick="go('shopping')"><b>🛒 Lista zakupów</b><span class="sub">Zobacz produkty</span></button><button onclick="go('plans')"><b>📚 Moje jadłospisy</b><span class="sub">Zmień aktywny plan</span></button></div><div class="hrow"><h2>Plan na dziś</h2><button class="link" onclick="go('plans')">Zmień plan</button></div>${p.meals.map((m,i)=>mealCard(m,i)).join('')}${(state.customMeals[dayKey()]||[]).map((m,i)=>customCard(m,i)).join('')}</div>`)}
function mealCard(m,i){let key=dayKey()+'_'+i;return `<div class="meal" onclick="recipe(${i})"><div class="mealImg" style="background-image:url('${imgUrl(m.img)}')"></div><div class="mealBody"><div class="mealType">${m.type} <span class="sub">${m.time}</span></div><div class="mealName">${m.name}</div><div class="macro"><span class="flame">🔥 ${m.kcal} kcal</span><br>B: ${m.b} g &nbsp; T: ${m.t} g &nbsp; W: ${m.w} g</div></div><div class="check"><button class="${state.eaten[key]?'done':''}" onclick="event.stopPropagation();state.eaten['${key}']=!state.eaten['${key}'];save();render()">✓</button></div></div>`}
function customCard(m,i){return `<div class="meal"><div class="mealImg" style="background-image:url('${img.salad}')"></div><div class="mealBody"><div class="mealType">Poza planem</div><div class="mealName">${m.name}</div><div class="macro"><span class="flame">🔥 ${m.kcal} kcal</span><br>B: ${m.b} g &nbsp; T: ${m.t} g &nbsp; W: ${m.w} g</div></div><div class="check"><button onclick="(state.customMeals[dayKey()]||[]).splice(${i},1);save();render()">×</button></div></div>`}
function recipe(i){let m=activePlan().meals[i];modal(`<button class="x" onclick="closeM()">×</button><div class="recipeImg" style="background-image:url('${imgUrl(m.img)}')"></div><h2>${m.name}</h2><p><b>${m.type}</b> • ${m.time} • ${m.kcal} kcal</p><h3>Składniki</h3>${m.ingredients.map((x,j)=>`<div class="shopItem"><span></span><img src="${prodImg(x[0])}"><span><b>${x[0]}</b><br><span class="small">${x[1]} ${x[2]}</span></span><button class="outline" onclick="swapIngredient('${x[0]}')">Zamień</button></div>`).join('')}<h3>Przygotowanie</h3><p>Przygotuj składniki, połącz według przepisu i dopraw do smaku. Gramatury możesz zmienić w szczegółach składników.</p>`)}
function swapIngredient(name){let list=ukProducts.filter(p=>p.name.toLowerCase().includes(name.split(' ')[0].toLowerCase())||p.cat);modal(`<button class="x" onclick="closeM()">×</button><h2>Zamień składnik</h2><input class="input" placeholder="Szukaj w bazie UK" value="${name}"><div class="storeFilters">${['Wszystkie','Tesco','ASDA','Sainsbury’s','Aldi','Lidl'].map(s=>`<button class="chip" onclick="state.store='${s}';save();swapIngredient('${name}')">${s}</button>`).join('')}</div>${ukProducts.filter(p=>state.store==='Wszystkie'||p.store===state.store).map(p=>`<div class="shopItem"><span>🇬🇧</span><img src="${p.img}"><span><b>${p.name}</b><br><span class="small">${p.store} • ${p.kcal} kcal/100 g</span></span><button class="primary" onclick="closeM()">Wybierz</button></div>`).join('')}`)}
function customMeal(){modal(`<button class="x" onclick="closeM()">×</button><h2>Dodaj posiłek spoza planu</h2><div class="recipeImg" style="background-image:url('${img.salad}')"></div><label>Nazwa posiłku</label><input id="cmName" class="input" value="Sałatka z kurczakiem"><label>Godzina</label><input id="cmTime" class="input" type="time" value="15:00"><div class="formgrid"><label>Kcal<input id="cmK" type="number" value="580"></label><label>Białko<input id="cmB" type="number" value="42"></label><label>Tłuszcze<input id="cmT" type="number" value="23"></label><label>Węgle<input id="cmW" type="number" value="48"></label></div><button class="primary" style="width:100%;margin-top:14px" onclick="addCustomMeal()">Dodaj posiłek</button>`)}function addCustomMeal(){let k=dayKey();state.customMeals[k]=state.customMeals[k]||[];state.customMeals[k].push({name:$('#cmName').value,kcal:+$('#cmK').value||0,b:+$('#cmB').value||0,t:+$('#cmT').value||0,w:+$('#cmW').value||0});save();closeM();render()}
function plans(){let mine=state.plans.filter(p=>!p.archived),arch=state.plans.filter(p=>p.archived);shell(`<div class="screen active"><div class="tabs"><button class="active">Moje plany</button><button onclick="archiveView()">Archiwum</button></div>${mine.map(p=>planCard(p)).join('')}<button class="cta" onclick="go('import')"><span class="plus">+</span><span>Importuj jadłospis (PDF/JSON)<br><small>Dodaj nowy plan do aplikacji</small></span></button></div>`)}function planCard(p){return `<div class="card plan"><div class="thumb" style="background-image:url('${imgUrl(p.img)}')"></div><div><div class="badge">${p.active?'AKTYWNY':''}</div><b>${p.name}</b><br><span class="small">${p.kcal} kcal • ${p.days} dni • ${p.meals.length} posiłków<br>Dodany ${p.added}</span></div><button class="iconbtn" onclick="planDetail('${p.id}')">${p.active?'✓':'⋯'}</button></div>`}function planDetail(id){let p=state.plans.find(x=>x.id===id);modal(`<button class="x" onclick="closeM()">×</button><h2>${p.name}</h2><div class="card plan"><div class="thumb" style="background-image:url('${imgUrl(p.img)}')"></div><div><b>${p.kcal} kcal</b><br><span class="small">${p.days} dni • ${p.meals.length} posiłków</span></div></div><button class="outline" style="width:100%" onclick="setPlan('${id}')">Ustaw jako aktywny</button><div class="card"><b>Statystyki planu</b><br>📅 ${p.days} dni &nbsp; 🏃 ${p.meals.length} posiłków &nbsp; 🔥 ${p.kcal} kcal/dzień</div><button class="link" onclick="duplicatePlan('${id}')">📄 Duplikuj plan</button><br><button class="link purple" onclick="archivePlan('${id}')">☂ Przenieś do archiwum</button><br><button class="link danger" onclick="deletePlan('${id}')">🗑 Usuń plan</button>`)}function setPlan(id){state.plans.forEach(p=>p.active=p.id===id);save();closeM();go('diary')}function duplicatePlan(id){let p=state.plans.find(x=>x.id===id);state.plans.push({...JSON.parse(JSON.stringify(p)),id:'p'+Date.now(),name:p.name+' kopia',active:false});save();plans();closeM()}function archivePlan(id){let p=state.plans.find(x=>x.id===id);p.archived=true;p.active=false;if(!state.plans.some(x=>x.active&&!x.archived))state.plans.find(x=>!x.archived).active=true;save();closeM();plans()}function deletePlan(id){state.plans=state.plans.filter(p=>p.id!==id);if(!state.plans.some(p=>p.active)&&state.plans[0])state.plans[0].active=true;save();closeM();plans()}function archiveView(){shell(`<div class="screen active"><div class="tabs"><button onclick="go('plans')">Moje plany</button><button class="active">Archiwum</button></div>${state.plans.filter(p=>p.archived).map(p=>`<div class="card plan"><div class="thumb" style="background-image:url('${imgUrl(p.img)}')"></div><div><b>${p.name}</b><br><span class="small">Zarchiwizowany</span></div><button class="outline" onclick="pRestore('${p.id}')">Przywróć</button></div>`).join('')||'<div class="empty">Archiwum jest puste</div>'}<div class="note">Plany w archiwum możesz przywrócić w dowolnym momencie.</div></div>`)}function pRestore(id){state.plans.find(p=>p.id===id).archived=false;save();archiveView()}
function importPlan(){shell(`<div class="screen active"><div class="drop"><div class="cloud">☁</div><h2>Przeciągnij plik PDF tutaj</h2><p>lub</p><input id="file" type="file" accept=".pdf,.json" style="display:none" onchange="handleFile(this.files[0])"><button class="primary" onclick="$('#file').click()">Wybierz plik PDF/JSON</button></div><div class="card"><b>Jak to działa?</b><ol><li>Wgraj plik PDF lub JSON z jadłospisem.</li><li>Aplikacja zapisze plan lokalnie.</li><li>Dla PDF tworzy plan i próbuje użyć nazwy pliku; pełne parsowanie PDF wymaga późniejszej konwersji.</li></ol></div><h3>Ostatnio importowane</h3>${state.plans.slice(-2).map(p=>planCard(p)).join('')}</div>`)}function handleFile(file){if(!file)return;let r=new FileReader();r.onload=()=>{if(file.name.endsWith('.json')){try{let data=JSON.parse(r.result);state.plans.push(data)}catch(e){alert('Niepoprawny JSON')}}else{state.plans.push({id:'p'+Date.now(),name:file.name,kcal:2100,days:7,meals:sampleMeals,img:'pdf',active:false,archived:false,added:new Date().toLocaleDateString('pl-PL')})}save();go('plans')};file.name.endsWith('.json')?r.readAsText(file):r.readAsArrayBuffer(file)}
function shopping(){let p=activePlan(),items={};p.meals.forEach(m=>m.ingredients.forEach(x=>{items[x[0]]=(items[x[0]]||0)+x[1]}));let bought=state.bought[dayKey()]||{};let cats={'Warzywa i owoce':[],'Produkty białkowe':[],'Produkty suche':[],'Nabiał':[]};Object.entries(items).forEach(([n,g])=>{let cat=/kurcz|łoso|jogurt|ser/i.test(n)?(/jogurt|ser/i.test(n)?'Nabiał':'Produkty białkowe'):/ryż|makaron|chleb/i.test(n)?'Produkty suche':'Warzywa i owoce';if(!bought[n])cats[cat].push([n,g])});shell(`<div class="screen active"><div class="tabs"><button class="active">Do kupienia</button><button onclick="boughtView()">Kupione</button><button>Szafki</button></div>${Object.entries(cats).map(([c,list])=>`<div class="shopGroup"><div class="shopHead">${c}<span>⌃</span></div>${list.map(([n,g])=>`<label class="shopItem"><input type="checkbox" onchange="markBought('${n}')"><img src="${prodImg(n)}"><span><b>${n}</b><br><span class="small">${Math.round(g)} g</span></span><button class="iconbtn">⋯</button></label>`).join('')||'<div class="empty">Brak produktów</div>'}</div>`).join('')}<button class="primary" onclick="addProduct()" style="width:100%">+ Dodaj produkt</button></div>`)}function markBought(n){state.bought[dayKey()]=state.bought[dayKey()]||{};state.bought[dayKey()][n]=true;save();shopping()}function boughtView(){let b=Object.keys(state.bought[dayKey()]||{});shell(`<div class="screen active"><div class="tabs"><button onclick="go('shopping')">Do kupienia</button><button class="active">Kupione</button></div>${b.map(n=>`<div class="shopItem"><span>✓</span><img src="${prodImg(n)}"><span><b>${n}</b><br><span class="small">Kupione</span></span><button class="outline" onclick="delete state.bought[dayKey()]['${n}'];save();boughtView()">Cofnij</button></div>`).join('')||'<div class="empty">Brak kupionych produktów</div>'}</div>`)}function prodImg(n){let p=ukProducts.find(x=>n.toLowerCase().includes(x.name.split(' ')[0].toLowerCase()));return p?p.img:img.salad}function addProduct(){modal(`<button class="x" onclick="closeM()">×</button><h2>Dodaj produkt UK</h2><div class="storeFilters">${['Wszystkie','Tesco','ASDA','Sainsbury’s','Aldi','Lidl'].map(s=>`<button class="chip ${state.store===s?'active':''}" onclick="state.store='${s}';save();addProduct()">${s}</button>`).join('')}</div>${ukProducts.filter(p=>state.store==='Wszystkie'||p.store===state.store).map(p=>`<div class="shopItem"><span>🇬🇧</span><img src="${p.img}"><span><b>${p.name}</b><br><span class="small">${p.store} • ${p.kcal} kcal/100 g</span></span><button class="primary" onclick="closeM()">Dodaj</button></div>`).join('')}`)}
function waterScreen(){shell(`<div class="screen active"><div class="card waterBox"><div class="waterDrop">💧</div><h2>${water()} ml</h2><p>z 2000 ml</p><div class="bar" style="color:var(--blue)"><i style="width:${Math.min(100,water()/2000*100)}%"></i></div><div class="waterBtns" style="margin-top:14px"><button class="primary" onclick="addWater(250)">+250</button><button class="primary" onclick="addWater(500)">+500</button><button class="outline" onclick="addWater(-250)">-250</button></div><button class="link" onclick="state.water[dayKey()]=0;save();render()">Reset wody</button></div></div>`)}function addWater(v){state.water[dayKey()]=Math.max(0,water()+v);save();render()}
const acts=['Spacer','Szybki marsz','Nordic Walking','Bieg','Bieg na bieżni','Rower','Rower stacjonarny','Trening siłowy','HIIT','Pływanie basen','Joga','Pilates','Taniec','Orbitrek'];function activity(){let a=state.activities[dayKey()]||[];shell(`<div class="screen active"><div class="grid3"><div class="metric orange"><div class="label">Spalone kcal</div><strong>${burned()}</strong><span>dzisiaj</span></div><div class="metric green"><div class="label">Treningi</div><strong>${a.length}</strong><span>sesje</span></div><div class="metric blue"><div class="label">Czas</div><strong>${a.reduce((s,x)=>s+x.min,0)}</strong><span>min</span></div></div><button class="primary" style="width:100%;margin:12px 0" onclick="addActModal()">+ Dodaj aktywność</button><button class="outline" style="width:100%" onclick="state.activities[dayKey()]=[];save();render()">Reset aktywności</button><div class="card">${a.map((x,i)=>`<div class="activityRow"><div class="circle">🏃</div><span><b>${x.name}</b><br><span class="small">${x.min} min</span></span><b>${x.kcal} kcal</b></div>`).join('')||'<div class="empty">Brak aktywności</div>'}</div></div>`)}function addActModal(){modal(`<button class="x" onclick="closeM()">×</button><h2>Dodaj aktywność Amazfit</h2><select id="act" class="input">${acts.map(a=>`<option>${a}</option>`).join('')}</select><input id="actMin" class="input" type="number" value="30" placeholder="Minuty"><input id="actK" class="input" type="number" value="250" placeholder="kcal"><button class="primary" style="width:100%" onclick="addAct()">Dodaj</button>`)}function addAct(){let k=dayKey();state.activities[k]=state.activities[k]||[];state.activities[k].push({name:$('#act').value,min:+$('#actMin').value||0,kcal:+$('#actK').value||0});save();closeM();activity()}
function scanner(){shell(`<div class="screen active"><div class="scanBox"><h2>Skaner produktów UK</h2><p class="small">Kamera działa przez HTTPS. Możesz też wpisać kod ręcznie.</p><video id="video" playsinline muted></video><button class="primary" onclick="startScan()">Uruchom kamerę</button><button class="outline" onclick="stopScan()">Stop</button><input id="manual" class="input" placeholder="Wpisz kod kreskowy"><button class="primary" onclick="lookupCode($('#manual').value)">Szukaj produktu</button><div id="scanMsg" class="card">Brak skanu</div></div></div>`)}let stream=null;async function startScan(){let msg=$('#scanMsg');if(!('BarcodeDetector'in window)){msg.textContent='Ta przeglądarka nie obsługuje BarcodeDetector. Użyj wpisu ręcznego.';return}try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});let v=$('#video');v.srcObject=stream;await v.play();let det=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','code_128']});let loop=async()=>{if(!stream)return;let c=await det.detect(v).catch(()=>[]);if(c.length){lookupCode(c[0].rawValue);stopScan();return}requestAnimationFrame(loop)};loop()}catch(e){msg.textContent='Nie można uruchomić kamery: '+e.message}}function stopScan(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}}async function lookupCode(code){let msg=$('#scanMsg');if(!code)return;msg.textContent='Kod: '+code+' — szukam...';try{let r=await fetch('https://world.openfoodfacts.org/api/v2/product/'+encodeURIComponent(code)+'.json');let j=await r.json();msg.innerHTML=j.product?`<b>${j.product.product_name||'Produkt'}</b><br>${j.product.brands||''}<br><button class="primary" onclick="customMeal()">Dodaj do jadłospisu</button>`:'Brak produktu w bazie.'}catch(e){msg.textContent='Brak internetu lub błąd bazy.'}}
function modal(html){$('#modal').className='modal show';$('#modal').innerHTML=`<div class="sheet">${html}</div>`}function closeM(){$('#modal').className='modal'}window.addEventListener('click',e=>{if(e.target.id==='modal')closeM()});if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');render();
</script></body></html>
