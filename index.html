<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#14963f"><link rel="manifest" href="manifest.webmanifest"><title>Jadłospisy AI PWA V2</title><style>
:root{--g:#168c39;--g2:#25b44e;--bg:#f6f7f8;--card:#fff;--text:#15171a;--muted:#667085;--line:#e8eaee;--orange:#ff7a00;--purple:#7c3aed;--blue:#2378d4;--red:#d92d20;--radius:18px}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text)}button,input{font:inherit}button{border:0;cursor:pointer}.app{max-width:440px;margin:0 auto;min-height:100dvh;background:#fff;box-shadow:0 0 30px #0001;position:relative;padding-bottom:78px}.top{height:58px;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fffefeea;backdrop-filter:blur(12px);z-index:10;border-bottom:1px solid #f1f1f1}.title{font-weight:800}.iconbtn{width:38px;height:38px;border-radius:12px;background:#f5f7f9;display:grid;place-items:center;font-size:20px}.content{padding:14px 16px 24px}.row{display:flex;gap:10px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 5px 18px #1018280a}.metric{flex:1;padding:14px 12px}.metric small{font-weight:700}.metric b{display:block;font-size:26px;margin:8px 0 0}.metric span{font-size:12px;color:var(--muted)}.bar{height:7px;background:#e8eaee;border-radius:9px;margin-top:12px;overflow:hidden}.bar>i{display:block;height:100%;background:var(--g);border-radius:9px}.orange{color:var(--orange)}.orange .bar>i,.bar.orange>i{background:var(--orange)}.blue{color:var(--blue)}.waterdrops{font-size:17px;letter-spacing:1px;margin-top:9px}.quick{margin:12px 0;background:linear-gradient(135deg,var(--g),var(--g2));color:#fff;border-radius:17px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 20px #168c3925}.plusbig{width:40px;height:40px;border-radius:50%;background:#fff;color:var(--g);display:grid;place-items:center;font-size:32px;line-height:1}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.tile{padding:14px;display:flex;gap:10px;align-items:center}.tile .ico{font-size:28px}.tile b{font-size:13px}.tile span{display:block;color:var(--muted);font-size:11px}.section{display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px}.section b{font-size:15px}.link{color:#111;background:transparent;font-size:12px}.meal{display:flex;gap:12px;padding:10px;margin-bottom:10px;align-items:center}.thumb{width:76px;height:66px;border-radius:14px;display:grid;place-items:center;font-size:33px;background:linear-gradient(135deg,#fff4d7,#f3fff0);overflow:hidden;flex:none}.meal h4{margin:0;font-size:13px;line-height:1.25}.meal small{color:var(--g);font-weight:800}.meal p{margin:3px 0 0;color:#333;font-size:12px}.check{margin-left:auto;width:25px;height:25px;border-radius:50%;border:2px solid #cfd4dc;display:grid;place-items:center;color:#fff;font-size:13px}.done .check{background:var(--g);border-color:var(--g)}.tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:14px}.tabs button{flex:1;background:#fff;padding:12px;color:#333;border-bottom:2px solid transparent}.tabs button.active{color:var(--g);border-color:var(--g);font-weight:800}.plan{display:flex;gap:12px;padding:12px;margin-bottom:12px;align-items:center}.plan.active{border-color:var(--g);box-shadow:0 0 0 1px var(--g) inset}.plan h3{font-size:15px;margin:0 0 4px}.plan p{margin:0;color:var(--muted);font-size:12px}.badge{color:var(--g);font-weight:800;font-size:10px}.dots{margin-left:auto;background:transparent;font-size:20px}.fab{position:sticky;bottom:86px;margin:14px 0 0;background:linear-gradient(135deg,var(--g),var(--g2));color:#fff;border-radius:16px;padding:16px;width:100%;font-weight:800}.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:440px;width:100%;height:70px;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);z-index:20}.nav button{background:#fff;color:#222;font-size:11px}.nav .nicon{display:block;font-size:22px}.nav button.active{color:var(--g);font-weight:800}.hidden{display:none!important}.drop{border:1.5px dashed #cfd4dc;border-radius:18px;padding:34px 18px;text-align:center;background:#fff}.cloud{font-size:48px}.greenbtn{background:var(--g);color:#fff;border-radius:999px;padding:12px 28px;font-weight:800}.info{padding:14px;margin-top:14px;color:#344054;font-size:13px;line-height:1.5}.mini{display:flex;gap:12px;align-items:center;padding:12px}.pdf{font-size:30px}.ok{margin-left:auto;color:#fff;background:var(--g);border-radius:50%;width:24px;height:24px;display:grid;place-items:center}.modal{position:fixed;inset:0;background:#0004;z-index:50;display:flex;align-items:flex-end;justify-content:center}.sheet{max-width:440px;width:100%;background:#fff;border-radius:24px 24px 0 0;padding:18px;max-height:88dvh;overflow:auto}.sheetTop{display:flex;align-items:center;justify-content:space-between}.close{background:#fff;font-size:26px}.hint{background:#f9fafb;border:1px solid var(--line);border-radius:15px;padding:12px;color:#344054;font-size:13px}.radioPlan{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--line)}.radio{margin-left:auto;width:24px;height:24px;border-radius:50%;border:2px solid #cfd4dc}.radio.on{border:7px solid var(--g)}.wideBtn{width:100%;padding:15px;background:var(--g);color:#fff;border-radius:14px;font-weight:800;margin-top:16px}.mealHero{height:190px;border-radius:22px;display:grid;place-items:center;font-size:78px;background:linear-gradient(135deg,#fff0da,#efffed);margin-bottom:14px}.macro{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.macro div{text-align:center;padding:12px}.macro b{display:block}.list{padding:0;margin:0;list-style:none}.list li{padding:12px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px}.steps{counter-reset:s}.steps li{display:block;position:relative;padding-left:38px}.steps li:before{counter-increment:s;content:counter(s);position:absolute;left:0;top:10px;background:#eef9f0;color:var(--g);font-weight:800;border-radius:50%;width:26px;height:26px;display:grid;place-items:center}.shopItem{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--line)}.prod{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:#f3f6f3;font-size:25px}.shopItem input{width:20px;height:20px}.category{font-weight:900;margin:18px 0 6px;color:#344054}.amaz{background:linear-gradient(135deg,#ecfdf3,#fff);padding:18px;text-align:center}.bigNum{font-size:38px;font-weight:900;color:var(--g)}.archiveInfo{background:#f4edff;border:1px solid #e6d7ff;color:#5b21b6;border-radius:16px;padding:12px;margin-top:16px;font-size:13px}.small{font-size:12px;color:var(--muted)}
@media(min-width:800px){body{background:#eef1f4}.app{margin:20px auto;border-radius:30px;overflow:hidden;min-height:850px}.nav{bottom:20px;border-radius:0 0 30px 30px}}
</style></head><body><div class="app"><header class="top"><button class="iconbtn" id="menuBtn">☰</button><div class="title" id="screenTitle">Dzisiaj⌄</div><button class="iconbtn" id="topAction">🔥 7</button></header><main class="content" id="view"></main><nav class="nav"><button data-v="home" class="active"><span class="nicon">🍴</span>Jadłospis</button><button data-v="shop"><span class="nicon">🛒</span>Zakupy</button><button data-v="scan"><span class="nicon">▣</span>Skaner</button><button data-v="activity"><span class="nicon">🔥</span>Aktywność</button><button data-v="profile"><span class="nicon">♡</span>Profil</button></nav></div><div id="modal" class="hidden"></div>
<script>
const mealEmojis={owsianka:'🥣',kurczak:'🍗',jogurt:'🍓',tost:'🥪',makaron:'🍝',jajecznica:'🍳',sałatka:'🥗',tortilla:'🌯',ryż:'🍚',zupa:'🍲',kanapki:'🥪',pudding:'🍮',omlet:'🥞',łosoś:'🐟'};
const prodEmoji=n=>{n=n.toLowerCase(); if(/jaj/.test(n))return'🥚'; if(/kurcz|mięso/.test(n))return'🍗'; if(/ryż|makaron|płatki/.test(n))return'🌾'; if(/jogurt|mleko|ser|skyr/.test(n))return'🥛'; if(/banan|jabł|jagod|owoc/.test(n))return'🍌'; if(/pomidor|warzyw|brokuł|sałat|ogór/.test(n))return'🥦'; if(/orzech|oliwa|olej/.test(n))return'🥜'; return'🛒'};
const emojiFor=t=>{t=t.toLowerCase(); for(const k in mealEmojis)if(t.includes(k))return mealEmojis[k]; return '🍽️'};
const seedMeals=[
['Śniadanie','08:00','Owsianka z bananem, jagodami i orzechami',520,['płatki owsiane 80 g','banan 120 g','jagody 50 g','orzechy włoskie 20 g','mleko 200 ml']],
['Obiad','13:00','Kurczak z ryżem jaśminowym i warzywami',620,['pierś z kurczaka 160 g','ryż jaśminowy 70 g','brokuł 150 g','marchew 80 g','oliwa 10 g']],
['Przekąska','16:30','Jogurt grecki z miodem i owocami',210,['jogurt grecki 200 g','miód 10 g','borówki 80 g']],
['Kolacja','19:30','Tosty z jajkiem, serem i pomidorem',650,['chleb pełnoziarnisty 100 g','jaja 2 szt.','ser mozzarella 60 g','pomidor 120 g']],
['Śniadanie','08:00','Omlet bananowy z jogurtem',510,['jaja 2 szt.','banan 100 g','jogurt naturalny 150 g','płatki owsiane 40 g']],
['Obiad','13:00','Makaron z kurczakiem i szpinakiem',635,['makaron pełnoziarnisty 80 g','pierś z kurczaka 150 g','szpinak 100 g','jogurt naturalny 80 g']],
['Przekąska','16:30','Kanapki z twarożkiem i warzywami',245,['chleb żytni 80 g','twaróg 120 g','ogórek 100 g','rzodkiewka 50 g']],
['Kolacja','19:30','Sałatka z jajkiem, ryżem i warzywami',610,['jaja 2 szt.','ryż 60 g','mix sałat 80 g','pomidor 120 g','oliwa 10 g']]
];
function makeMeals(kcal=2000){let arr=[];for(let d=1;d<=7;d++){seedMeals.slice((d%2)*4,(d%2)*4+4).forEach((m,i)=>arr.push({id:crypto.randomUUID(),day:d,type:m[0],time:m[1],title:m[2],cal:Math.round(m[3]*kcal/2000),ingredients:m[4],done:d==1&&i<2,img:emojiFor(m[2]),instructions:instructionsFor(m[2])}))}return arr}
function instructionsFor(t){let low=t.toLowerCase(); if(low.includes('owsianka'))return ['Wsyp płatki do garnka i zalej mlekiem lub wodą.','Gotuj 4–5 minut, mieszając.','Przełóż do miski, dodaj banana, jagody i orzechy.']; if(low.includes('kurczak'))return ['Ugotuj ryż zgodnie z instrukcją na opakowaniu.','Pokrój kurczaka i dopraw solą, pieprzem oraz papryką.','Usmaż kurczaka na patelni, a warzywa ugotuj lub podduś.','Podaj wszystko razem z oliwą lub sosem jogurtowym.']; if(low.includes('jogurt'))return ['Przełóż jogurt do miski.','Dodaj owoce i miód.','Wymieszaj lub podaj warstwowo.']; if(low.includes('tost'))return ['Podpiecz pieczywo.','Usmaż lub ugotuj jajka.','Dodaj ser, pomidora i złóż tosty.']; return ['Przygotuj i odmierz składniki.','Wykonaj podstawową obróbkę: gotowanie, smażenie lub pieczenie.','Połącz składniki i dopraw do smaku.','Podawaj bezpośrednio po przygotowaniu.']}
function defaultPlans(){return [{id:'p2000',name:'Biedronkowy 2000 kcal',kcal:2000,days:7,active:true,archived:false,date:'20.05.2025',meals:makeMeals(2000),water:1750,activity:{steps:8430,burned:520,connected:false}},{id:'p2500',name:'Biedronkowy 2500 kcal',kcal:2500,days:7,active:false,archived:false,date:'18.05.2025',meals:makeMeals(2500),water:900,activity:{steps:0,burned:0,connected:false}},{id:'p1800',name:'Redukcja 1800 kcal',kcal:1800,days:7,active:false,archived:false,date:'15.05.2025',meals:makeMeals(1800),water:0,activity:{steps:0,burned:0,connected:false}},{id:'p3000',name:'Masa 3000 kcal',kcal:3000,days:7,active:false,archived:false,date:'10.05.2025',meals:makeMeals(3000),water:0,activity:{steps:0,burned:0,connected:false}},{id:'a1900',name:'Biedronkowy 1900 kcal',kcal:1900,days:7,active:false,archived:true,date:'10.05.2025',meals:makeMeals(1900),water:0,activity:{steps:0,burned:0,connected:false}}]}
let state=JSON.parse(localStorage.dietPwaV2||'null')||{view:'home',day:1,plans:defaultPlans(),extra:[]};
const save=()=>localStorage.dietPwaV2=JSON.stringify(state); const active=()=>state.plans.find(p=>p.active)||state.plans[0];
function setView(v){state.view=v;save();render()} document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>setView(b.dataset.v));
function render(){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.v==state.view)); const v=document.getElementById('view'),t=document.getElementById('screenTitle'),a=active(); document.getElementById('topAction').onclick=()=>openPlans(); if(state.view=='home'){t.textContent='Dzisiaj⌄';home(v,a)} if(state.view=='shop'){t.textContent='Lista zakupów';shop(v,a)} if(state.view=='scan'){t.textContent='Skaner produktów';scan(v,a)} if(state.view=='activity'){t.textContent='Aktywność';activity(v,a)} if(state.view=='profile'){t.textContent='Moje jadłospisy';plans(v)}}
function home(v,p){let meals=p.meals.filter(m=>m.day==state.day);let eaten=meals.filter(m=>m.done).reduce((s,m)=>s+m.cal,0)+state.extra.reduce((s,x)=>s+x.cal,0);v.innerHTML=`<div class=row><div class="card metric"><small style="color:var(--g)">Spożyte kcal</small><b style="color:var(--g)">${eaten}</b><span>/ ${p.kcal} kcal</span><div class=bar><i style="width:${Math.min(100,eaten/p.kcal*100)}%"></i></div></div><div class="card metric orange"><small>Spalone kcal</small><b>${p.activity.burned}</b><span>/ 800 kcal</span><div class="bar orange"><i style="width:${Math.min(100,p.activity.burned/800*100)}%"></i></div></div><div class="card metric blue"><small>Woda</small><b style="color:#111">${p.water}</b><span>ml / 2000 ml</span><div class=waterdrops>💧💧💧💧 <button class=iconbtn onclick="addWater()" style="display:inline;width:24px;height:24px;font-size:16px">+</button></div></div></div><button class=quick onclick="addExtra()"><span class=plusbig>+</span><span><b>Dodaj posiłek spoza planu</b><br><small>Dodaj produkt lub gotowy posiłek</small></span></button><div class=grid><div class="card tile" onclick="setView('scan')"><span class=ico>▣</span><span><b>Skaner produktów</b><span>Skanuj kod kreskowy</span></span></div><div class="card tile" onclick="setView('activity')"><span class=ico>🏃</span><span><b>Aktywności Amazfit</b><span>Połącz i synchronizuj</span></span></div><div class="card tile" onclick="setView('shop')"><span class=ico>🛒</span><span><b>Lista zakupów</b><span>Zobacz produkty</span></span></div><div class="card tile" onclick="alert('Moduł AI rozpoznawania potraw jest przygotowany jako ekran V3.')"><span class=ico>✨</span><span><b>Zdjęcia potraw AI</b><span>Zobacz dania z menu</span></span></div></div><div class=section><b>Plan na dziś</b><button class=link onclick="openPlans()">Zmień plan</button></div>${meals.map(m=>`<div class="card meal ${m.done?'done':''}" onclick="openMeal('${m.id}')"><div class=thumb>${m.img}</div><div><small>${m.type} <span style="color:#777;font-weight:500">${m.time}</span></small><h4>${m.title}</h4><p>${m.cal} kcal</p></div><button onclick="event.stopPropagation();toggleMeal('${m.id}')" class=check>${m.done?'✓':''}</button></div>`).join('')}`}
function addWater(){active().water+=250;save();render()} function toggleMeal(id){let m=active().meals.find(x=>x.id==id);m.done=!m.done;save();render()} function addExtra(){let name=prompt('Nazwa posiłku spoza planu','Baton proteinowy'); if(!name)return; let cal=+prompt('Kalorie','220')||0; state.extra.push({name,cal});save();render()}
function shopping(p){let map={};p.meals.forEach(m=>m.ingredients.forEach(i=>{let n=i.replace(/\s\d.*$/,'');map[n]=(map[n]||0)+1}));return Object.keys(map).map(n=>({name:n,qty:map[n]>1?map[n]+' porcje':'1 porcja',cat:/jogurt|mleko|ser|twaróg/.test(n)?'Nabiał':/kurcz|pierś/.test(n)?'Mięso':/ryż|makaron|płatki|chleb/.test(n)?'Produkty sypkie i pieczywo':/banan|jag|bor/.test(n)?'Owoce':/oliwa|orzech/.test(n)?'Tłuszcze':/jaja/.test(n)?'Jaja':'Warzywa'}))}
function shop(v,p){let items=shopping(p),cats=[...new Set(items.map(i=>i.cat))];v.innerHTML=`<div class=section><b>${p.name}</b><span class=small>${items.length} produktów</span></div>${cats.map(c=>`<div class=category>${c}</div><div class=card>${items.filter(i=>i.cat==c).map(i=>`<label class=shopItem><div class=prod>${prodEmoji(i.name)}</div><div><b>${i.name}</b><div class=small>${i.qty}</div></div><input type=checkbox></label>`).join('')}</div>`).join('')}`}
function activity(v,p){v.innerHTML=`<div class="card amaz"><h2>Amazfit / Zepp</h2><p class=small>Synchronizacja kroków, spalonych kcal, dystansu i treningów dla aktywnego planu.</p><div class=bigNum>${p.activity.steps.toLocaleString('pl-PL')}</div><b>kroków dzisiaj</b><p><b>${p.activity.burned} kcal</b> spalonych</p><button class=greenbtn onclick="syncAmazfit()">${p.activity.connected?'Synchronizuj teraz':'Połącz Amazfit'}</button></div><div class=section><b>Ostatnie aktywności</b></div><div class=card><div class=shopItem><div class=prod>🚶</div><div><b>Spacer</b><div class=small>42 min · 230 kcal</div></div></div><div class=shopItem><div class=prod>🏋️</div><div><b>Trening siłowy</b><div class=small>35 min · 290 kcal</div></div></div></div>`}
function syncAmazfit(){let p=active();p.activity.connected=true;p.activity.steps=10840;p.activity.burned=640;save();render()}
function scan(v,p){v.innerHTML=`<div class="card info"><h3>Skaner produktów</h3><p>Zeskanuj kod kreskowy lub wpisz produkt ręcznie. W tej wersji PWA skaner jest symulowany.</p><button class=wideBtn onclick="addScanned()">Dodaj zeskanowany produkt</button></div><div class="card info"><h3>AI Food Photo</h3><p>Moduł przygotowany pod rozpoznawanie potraw ze zdjęcia i szacowanie kalorii.</p></div>`} function addScanned(){state.extra.push({name:'Zeskanowany skyr waniliowy',cal:150});save();alert('Dodano produkt do dziennika.');setView('home')}
function plans(v){let live=state.plans.filter(p=>!p.archived),arc=state.plans.filter(p=>p.archived);v.innerHTML=`<div class=tabs><button class="active" onclick="plansTab(false)">Moje plany</button><button onclick="plansTab(true)">Archiwum</button></div><div id=plansList>${planList(live,false)}</div><button class=fab onclick="openImport()">＋ Importuj jadłospis (PDF/JSON)<br><small>Dodaj nowy plan do aplikacji</small></button>`}
function plansTab(arch){document.querySelectorAll('.tabs button').forEach((b,i)=>b.classList.toggle('active',i==(arch?1:0)));document.getElementById('plansList').innerHTML=planList(state.plans.filter(p=>p.archived==arch),arch)}
function planList(arr,arch){return arr.map(p=>`<div class="card plan ${p.active?'active':''}" onclick="openPlanDetails('${p.id}')"><div class=thumb style="width:62px;height:62px;font-size:30px">🍲</div><div><div class=badge>${p.active?'AKTYWNY':''}</div><h3>${p.name}</h3><p>${p.kcal} kcal · ${p.days} dni · ${p.meals.length} posiłków<br>${arch?'Zarchiwizowany':'Dodany'} ${p.date}</p></div><button class=dots onclick="event.stopPropagation();openPlanDetails('${p.id}')">•••</button></div>`).join('')+(arch?'<div class=archiveInfo>Plany w archiwum są bezpiecznie przechowywane. Możesz je przywrócić w każdej chwili.</div>':'')}
function openPlans(){let p=active();show(`<div class=sheet><div class=sheetTop><h2>Zmień aktywny plan</h2><button class=close onclick="hide()">×</button></div><div class=hint>Zmiana planu przełączy posiłki, postępy, wodę, aktywności i listę zakupów.</div>${state.plans.filter(x=>!x.archived).map(x=>`<div class=radioPlan><div class=thumb style="width:48px;height:48px;font-size:24px">🍲</div><div><b>${x.name}</b><div class=small>${x.kcal} kcal · ${x.days} dni · ${x.meals.length} posiłków</div></div><div class="radio ${x.active?'on':''}" onclick="setActive('${x.id}')"></div></div>`).join('')}<button class=wideBtn onclick="hide()">Ustaw jako aktywny</button></div>`)}
function setActive(id){state.plans.forEach(p=>p.active=p.id==id);save();hide();render()}
function openPlanDetails(id){let p=state.plans.find(x=>x.id==id);show(`<div class=sheet><div class=sheetTop><button class=close onclick="hide()">‹</button><h3>${p.name}</h3><button class=close onclick="hide()">×</button></div><div class="card plan"><div class=thumb>🍲</div><div><h3>${p.name}</h3><p>${p.kcal} kcal · ${p.days} dni · ${p.meals.length} posiłków</p></div></div><div class=macro><div class=card><b>${p.days}</b><span class=small>Dni</span></div><div class=card><b>${p.meals.length}</b><span class=small>Posiłków</span></div><div class=card><b>${p.kcal}</b><span class=small>kcal/dzień</span></div></div><div class=section><b>Opcje</b></div><div class=card><div class=shopItem onclick="setActive('${p.id}')"><div class=prod>✅</div><b>Ustaw jako aktywny</b></div><div class=shopItem onclick="duplicatePlan('${p.id}')"><div class=prod>📄</div><b>Duplikuj plan</b></div><div class=shopItem onclick="archivePlan('${p.id}')"><div class=prod>📦</div><b>${p.archived?'Przywróć z archiwum':'Przenieś do archiwum'}</b></div><div class=shopItem onclick="deletePlan('${p.id}')"><div class=prod>🗑️</div><b style="color:var(--red)">Usuń plan</b></div></div></div>`)}
function duplicatePlan(id){let p=state.plans.find(x=>x.id==id);let n=JSON.parse(JSON.stringify(p));n.id=crypto.randomUUID();n.name=p.name+' kopia';n.active=false;n.archived=false;n.date=new Date().toLocaleDateString('pl-PL');state.plans.push(n);save();hide();render()}function archivePlan(id){let p=state.plans.find(x=>x.id==id);p.archived=!p.archived;if(p.active&&p.archived){p.active=false;(state.plans.find(x=>!x.archived)||p).active=true}save();hide();render()}function deletePlan(id){if(!confirm('Usunąć plan?'))return;state.plans=state.plans.filter(p=>p.id!=id);if(!active()&&state.plans[0])state.plans[0].active=true;save();hide();render()}
function openImport(){show(`<div class=sheet><div class=sheetTop><h2>Importuj jadłospis</h2><button class=close onclick="hide()">×</button></div><div class=drop ondragover="event.preventDefault()" ondrop="fakeImport(event)"><div class=cloud>☁️</div><h3>Przeciągnij plik PDF tutaj</h3><p class=small>lub</p><input id=fileInput type=file accept=".pdf,.json" hidden onchange="fakeImport(event)"><button class=greenbtn onclick="fileInput.click()">Wybierz plik PDF</button></div><div class="card info"><b>Jak to działa?</b><ol><li>Wgraj plik PDF z jadłospisem</li><li>Aplikacja odczyta dni, posiłki i wartości odżywcze</li><li>Zapisz plan i zacznij korzystać</li></ol><p>W tej paczce import tworzy demonstracyjny plan zgodny ze strukturą PDF.</p></div><div class=section><b>Ostatnio importowane</b></div><div class="card mini"><div class=pdf>📄</div><div><b>Biedronkowy_2000_kcal.pdf</b><div class=small>20.05.2025 · 2.4 MB</div></div><div class=ok>✓</div></div></div>`)}
function fakeImport(e){e.preventDefault&&e.preventDefault();let name='Własny jadłospis.pdf';let files=e.dataTransfer?.files||e.target?.files;if(files&&files[0])name=files[0].name;let p={id:crypto.randomUUID(),name:name.replace(/\.pdf$/i,''),kcal:2100,days:7,active:false,archived:false,date:new Date().toLocaleDateString('pl-PL'),meals:makeMeals(2100),water:0,activity:{steps:0,burned:0,connected:false}};state.plans.push(p);save();hide();setView('profile')}
function openMeal(id){let m=active().meals.find(x=>x.id==id);show(`<div class=sheet><div class=sheetTop><button class=close onclick="hide()">‹</button><h3>Szczegóły posiłku</h3><button class=close onclick="hide()">×</button></div><div class=mealHero>${m.img}</div><h2>${m.title}</h2><p class=small>${m.type} · ${m.time} · ${m.cal} kcal</p><div class=macro><div class=card><b>${Math.round(m.cal*.22/4)} g</b><span class=small>Białko</span></div><div class=card><b>${Math.round(m.cal*.28/9)} g</b><span class=small>Tłuszcze</span></div><div class=card><b>${Math.round(m.cal*.5/4)} g</b><span class=small>Węgle</span></div></div><div class=section><b>Składniki</b></div><ul class="card list">${m.ingredients.map(i=>`<li><span>${prodEmoji(i)} ${i}</span></li>`).join('')}</ul><div class=section><b>Przygotowanie</b></div><ol class="card list steps">${m.instructions.map(i=>`<li>${i}</li>`).join('')}</ol></div>`)}
function show(html){let m=document.getElementById('modal');m.className='modal';m.innerHTML=html} function hide(){let m=document.getElementById('modal');m.className='hidden';m.innerHTML=''}
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');render();
</script></body></html>
